first_time_setup:
  title: "Configuração inicial"
  welcome_heading: "Bem-vindo"
  welcome_content: >-
    O Hachimi foi instalado! Esta tela irá guiá-lo através do processo inicial de instalação.
    Se não estiver interessado em utilizar as funcionalidades de tradução, pode ignorá-las fechando esta janela.


    AVISO: O Hachimi é um projeto desenvolvido pela comunidade. Todas as traduções foram feitas por vários contribuintes.
    Este projeto não é desenvolvido e nem apoiado pela Cygames, Inc., e viola os termos de serviço do jogo. Ao continuar,
    você está aceitando os riscos envolvidos.
  translation_repo_heading: "Repositório de tradução"
  select_translation_repo: "Selecione um repositório de tradução:"
  no_compatible_repo: "Nenhum repositório de tradução é compatível com esta versão do jogo."
  skip_translation: "Ignorar traduções."
  complete_heading: "Feito!"
  complete_content: >-
    Clique em Finalizar para salvar as configurações.
    Se você tiver escolhido um repositório de tradução, uma busca por atualizações será realizada
    e em seguida será perguntando se você deseja baixar os dados de tradução disponíveis.

