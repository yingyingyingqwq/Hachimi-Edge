    py3translationServer ou Sugoi Toolkit. Sem um servidor rodando, nenhuma tradução
    poderá ser realizada e a jogabilidade do jogo pode acabar sendo afetada.
    Por favor, deixe esta opção desabilitada se você não tem um servidor
    de tradução disponível.
