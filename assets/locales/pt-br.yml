update_prompt_dialog:
  title: "Uma nova atualização está disponível"
  content: |
    Uma nova atualização do Hachimi está disponível (%{version}). Deseja instalá-la?
    O jogo será reiniciado para aplicar a atualização.
  android_content: |
    Uma nova atualização do Hachimi Edge está disponível (%{version}). Deseja instalá-la?

    Toque em "Sim" para abrir o UmaPatcher Edge e reaplicar o patch no jogo.
    (Não será necessário baixar os APKs do jogo novamente. Basta apenas aplicar o patch mais uma vez para que o UmaPatcher Edge instale a última versão do Hachimi Edge.)

updating_dialog:
  title: "Atualizando"
  content: "Baixando atualização, o jogo reiniciará brevemente..."

steam_overlay_conflict_dialog:
  title: "Aviso"
  content: >-
    Compras podem não funcionar com a sobreposição do Hachimi habilitada. Se a sobreposição da Steam estiver aparecendo
    por cima desta tela, ignore esta mensagem e pressione Não. Se nada tiver acontecido, pressione Sim
    para desabilitar a sobreposição do Hachimi temporariamente. O jogo será fechado e, ao abri-lo novamente,
    a sobreposição do Hachimi estará desabilitada e você conseguirá realizar a sua compra normalmente. Após isso,
    basta reiniciar o seu jogo para habilitar a sobreposição do Hachimi novamente.
